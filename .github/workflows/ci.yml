name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  test:
    name: Test and evaluation gates
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.13"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Whitespace check
        run: git diff --check

      - name: Compile
        run: python -m compileall aegis main.py tests skills/aegis-repo-analyst/scripts/run_aegis.py

      - name: Unit tests
        run: python -m unittest discover -s tests -v

      - name: Editable install smoke test
        run: |
          python -m pip install -e .
          aegis --help
          aegis examples/sample_repo --doctor --json
          aegis examples/sample_repo --max-files 100 --no-cache --eval --eval-fail-under 1.0 --json

      - name: Doctor smoke test
        run: python main.py examples/sample_repo --doctor --json

      - name: Sample repo evaluation gate
        run: python main.py examples/sample_repo --max-files 100 --no-cache --eval --eval-fail-under 1.0 --json

      - name: EDA repo evaluation gate
        run: python main.py examples/eda_repo --max-files 100 --no-cache --eval --eval-fail-under 1.0 --json

      - name: Readiness gate
        run: python main.py examples/sample_repo --max-files 100 --no-cache --ready --ready-fail-under 1.0 --ready-ask "POST /users call chain" --json

      - name: Run summary handoff gate
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          path = Path("output/aegis/sample_repo/run_summary.json")
          summary = json.loads(path.read_text(encoding="utf-8"))
          assert summary["status"] == "ready"
          assert summary["qa"]["available"] is True
          assert summary["qa"]["context_safe_for_llm"] is True
          assert summary["readiness"]["passed"] is True
          assert summary["artifacts"]["run_summary.json"]["exists"] is True
          assert summary["artifacts"]["run_summary.json"]["size"] == path.stat().st_size
          PY
